services:
  - type: web
    name: cenbidding-backend
    runtime: node
    region: singapore
    plan: free
    branch: master
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx nest build
    startCommand: npx prisma db push && node dist/src/main.js
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    # ponytail: env vars with `value:` sync via Blueprint; `sync: false` set in Dashboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://cenbidding.vercel.app
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
